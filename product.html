<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0D0D0D">
    <title>تفاصيل المنتج | Infinity Store</title>
    <link rel="icon" type="image/png" href="./assets/logo-white.png">
    
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts: Cairo & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Navigation Bar -->
    <header class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="logo">
                <img src="./assets/logo-white.png" alt="Infinity Store" class="logo-img">
                <span class="logo-text">Infinity <span class="accent-text">Store</span></span>
            </a>
            <nav class="nav-links">
                <a href="index.html#hero">الرئيسية</a>
                <a href="index.html#products">منتجاتنا</a>
                <a href="index.html#calculator">الأسعار</a>
                <a href="index.html#payments">طرق الدفع</a>
                <a href="index.html#tracking">تتبع الطلب</a>
                <a href="index.html#portfolio">معرض الأعمال</a>
            </nav>
            <button class="btn btn-primary btn-nav open-order-btn" onclick="openOrderModal()">اطلب الآن</button>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- Mobile Navigation Drawer -->
    <div class="mobile-drawer" id="mobileDrawer">
        <button class="close-drawer-btn" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="drawer-links">
            <a href="index.html#hero" onclick="toggleMobileMenu()">الرئيسية</a>
            <a href="index.html#products" onclick="toggleMobileMenu()">منتجاتنا</a>
            <a href="index.html#calculator" onclick="toggleMobileMenu()">الأسعار</a>
            <a href="index.html#payments" onclick="toggleMobileMenu()">طرق الدفع</a>
            <a href="index.html#tracking" onclick="toggleMobileMenu()">تتبع الطلب</a>
            <a href="index.html#portfolio" onclick="toggleMobileMenu()">معرض الأعمال</a>
            <button class="btn btn-primary open-order-btn" onclick="toggleMobileMenu(); openOrderModal()">اطلب الآن</button>
        </div>
    </div>

    <!-- Page Header (Breadcrumbs) -->
    <section class="page-header">
        <div class="container">
            <div class="breadcrumb">
                <a href="index.html">الرئيسية</a>
                <span>/</span>
                <span>المنتجات</span>
                <span>/</span>
                <span id="breadcrumbProduct">اسم المنتج</span>
            </div>
            <h1 id="pageTitle">اسم المنتج</h1>
        </div>
    </section>

    <!-- Product Customization & Details Page -->
    <section class="product-page">
        <div class="container">
            <div class="product-details">
                
                <!-- Product Visual Preview Column -->
                <div class="product-image">
                    <div class="main-image-wrap" id="mainImageWrap">
                        <img id="productImage"
                             src="./assets/placeholder.jpg"
                             alt="صورة المنتج"
                             onerror="this.src='./assets/placeholder.jpg'">
                        
                        <!-- Dynamic Overlay for Live Preview Mockup -->
                        <div id="previewOverlay" class="preview-overlay">
                            <img id="previewImage" src="" alt="تصميم العميل" style="display: none;">
                            <div id="previewText" style="display: none;"></div>
                        </div>

                        <button type="button" id="productPrevBtn" class="img-nav-btn img-nav-left"><i class="fa-solid fa-chevron-left"></i></button>
                        <button type="button" id="productNextBtn" class="img-nav-btn img-nav-right"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>

                    <!-- Images Gallery -->
                    <div id="productGallery" class="product-gallery"></div>

                    <!-- Features Highlights -->
                    <div class="product-features">
                        <div class="feature">
                            <i class="fa-solid fa-circle-check"></i>
                            <span>طباعة ديجيتال وحرارية بأعلى جودة وثبات
