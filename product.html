<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تفاصيل المنتج | Infinity Store</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<section class="page-header">

    <div class="container">

        <div class="breadcrumb">

            <a href="index.html">الرئيسية</a>

            <span>/</span>

            <span>المنتجات</span>

            <span>/</span>

            <span id="breadcrumbProduct">اسم المنتج</span>

        </div>

        <h1 id="pageTitle">
            اسم المنتج
        </h1>

    </div>

</section>

<section class="product-page">

    <div class="container">

        <div class="product-details">

            <div class="product-image">

    <div class="main-image-wrap">
        <img id="productImage"
             src=""
             alt="">

        <button type="button" id="productPrevBtn" class="img-nav-btn img-nav-left"><i class="fa-solid fa-chevron-left"></i></button>
        <button type="button" id="productNextBtn" class="img-nav-btn img-nav-right"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div id="productGallery" class="product-gallery"></div>

    <div class="product-features">

        <div class="feature">
            <i class="fa-solid fa-circle-check"></i>
            <span>طباعة بجودة عالية</span>
        </div>

        <div class="feature">
            <i class="fa-solid fa-truck-fast"></i>
            <span>شحن لجميع المحافظات</span>
        </div>

        <div class="feature">
            <i class="fa-solid fa-shield-halved"></i>
            <span>خامات مضمونة</span>
        </div>

    </div>

</div>

            <div class="product-content">

                <span class="product-detail-badge">
                    الأكثر مبيعاً
                </span>

                <h1 id="productTitle">
                    اسم المنتج
                </h1>

                <p id="productDescription">
                    وصف المنتج
                </p>

                <h2 id="productPrice">
                    120 EGP
                </h2>

                <button
                    class="btn btn-primary btn-lg">

                    اطلب الآن

                </button>

            </div>

        </div>

    </div>

</section>

<script src="app.js"></script>

</body>

</html>
