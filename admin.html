<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infinity Store | Admin Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="admin-login">

    <div class="login-card">

        <img src="./assets/logo.png.png" class="admin-logo">

        <h1>Infinity Store</h1>

        <p>Admin Dashboard</p>

        <input id="username" type="text" placeholder="Username">

        <input id="password" type="password" placeholder="Password">

        <button id="loginBtn">

            <i class="fas fa-right-to-bracket"></i>

            Login

        </button>

    </div>

</div>



<div class="admin-dashboard">

<header class="admin-header">

<h2>

<i class="fas fa-chart-line"></i>

Infinity Dashboard

</h2>

<button id="logoutBtn">

<i class="fas fa-right-from-bracket"></i>

Logout

</button>

</header>

<main class="dashboard-content">

    <div class="stats">

        <div class="card">
            <h2 id="ordersCount">0</h2>
            <p>إجمالي الطلبات</p>
        </div>

        <div class="card">
            <h2 id="newCount">0</h2>
            <p>طلبات جديدة</p>
        </div>

        <div class="card">
            <h2 id="shippingCount">0</h2>
            <p>جاري الشحن</p>
        </div>

        <div class="card">
            <h2 id="doneCount">0</h2>
            <p>تم التسليم</p>
        </div>

    </div>

    <div class="search-box">

        <input
    type="text"
    id="searchInput"
    placeholder="🔍 ابحث برقم الطلب أو اسم العميل أو رقم الهاتف"
    onkeyup="searchOrders()">
        
    </div>

    <table class="orders-table">

        <thead>

            <tr>

                <th>رقم الطلب</th>
                <th>العميل</th>
                <th>المنتج</th>
                <th>المحافظة</th>
                <th>الحالة</th>
                <th>التاريخ</th>
                <th>الإجراءات</th>

            </tr>

        </thead>

        <tbody id="ordersTable">

        </tbody>

    </table>

</main>

</div>

<div id="orderModal" class="modal">

    <div class="modal-content">

        <span class="close-modal" onclick="closeModal()">&times;</span>

        <h2>تفاصيل الطلب</h2>

        <div class="order-info">

            <p><strong>رقم الطلب:</strong> <span id="mOrderId"></span></p>

            <p><strong>اسم العميل:</strong> <span id="mName"></span></p>

            <p><strong>رقم الهاتف:</strong> <span id="mPhone"></span></p>

            <p><strong>المنتج:</strong> <span id="mProduct"></span></p>

            <p><strong>الكمية:</strong> <span id="mQty"></span></p>

            <p><strong>المحافظة:</strong> <span id="mCity"></span></p>

            <p><strong>العنوان:</strong> <span id="mDetails"></span></p>

            <p><strong>التاريخ:</strong> <span id="mDate"></span></p>

            <p><strong>الحالة:</strong></p>

            <select id="mStatus">

                <option>تم استلام الطلب</option>
                <option>جاري التصميم</option>
                <option>جاري الطباعة</option>
                <option>جاهز للشحن</option>
                <option>تم الشحن</option>
                <option>تم التسليم</option>

            </select>

            <button id="saveStatusBtn">

                حفظ الحالة

            </button>

        </div>

    </div>

</div>
    
<script src="admin.js"></script>

</body>

</html>
